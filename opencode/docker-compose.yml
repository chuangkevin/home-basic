services:
  opencode:
    build: .
    ports:
      - "4096:4096"
      - "1455:1455"   # OAuth browser callback (fixed port)
    environment:
      # Default: opencode/gpt-5-nano (free, no key needed)
      # Upgrade: set OPENCODE_API_KEY for paid zen models
      - OPENCODE_CONFIG_CONTENT={"model":"opencode/deepseek-v4-flash-free","small_model":"opencode/deepseek-v4-flash-free"}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    restart: unless-stopped
