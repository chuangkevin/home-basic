services:
  opencode:
    build: .
    expose:
      - "4096"
    environment:
      - OPENCODE_CONFIG_CONTENT={"model":"opencode/deepseek-v4-flash-free","small_model":"opencode/deepseek-v4-flash-free"}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - opencode-data:/root/.local/share/opencode
      - opencode-config:/root/.config/opencode
    restart: unless-stopped

  web:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./web:/srv:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - opencode
    restart: unless-stopped

volumes:
  opencode-data:
  opencode-config:
  caddy-data:
  caddy-config:
